<svg width="1100" height="620" viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF9900"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4053D6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1A73E8"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <rect width="1100" height="620" fill="#F2F3F3"/>
  <text x="550" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#232F3E">Parallel Scan Pipeline — Fanout &amp; Finalization</text>

  <!-- ── Trigger row ── -->
  <!-- EventBridge -->
  <g filter="url(#shadow)">
    <rect x="40" y="80" width="170" height="80" rx="8" fill="white" stroke="#E7157B" stroke-width="1.5"/>
    <rect x="40" y="80" width="170" height="24" rx="8" fill="#E7157B"/>
    <rect x="40" y="92" width="170" height="12" fill="#E7157B"/>
    <text x="125" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="white">EventBridge Scheduler</text>
    <text x="125" y="118" text-anchor="middle" font-size="10" fill="#880E4F">MON–FRI every 3h</text>
    <text x="125" y="133" text-anchor="middle" font-size="10" fill="#880E4F">6am – 9pm ET</text>
    <text x="125" y="148" text-anchor="middle" font-size="10" fill="#AD1457">cron(0 6,9,12,15,18,21 ...)</text>
  </g>

  <!-- Browser -->
  <g filter="url(#shadow)">
    <rect x="40" y="195" width="170" height="70" rx="8" fill="#37474F" stroke="#263238" stroke-width="1.5"/>
    <rect x="40" y="195" width="170" height="24" rx="8" fill="#263238"/>
    <rect x="40" y="207" width="170" height="12" fill="#263238"/>
    <text x="125" y="213" text-anchor="middle" font-size="11" font-weight="700" fill="white">Browser</text>
    <text x="125" y="233" text-anchor="middle" font-size="10" fill="#CFD8DC">POST /api/run</text>
    <text x="125" y="249" text-anchor="middle" font-size="10" fill="#90A4AE">Manual trigger</text>
  </g>

  <!-- API Lambda -->
  <g filter="url(#shadow)">
    <rect x="270" y="150" width="170" height="80" rx="8" fill="white" stroke="#FF9900" stroke-width="1.5"/>
    <rect x="270" y="150" width="170" height="24" rx="8" fill="#FF9900"/>
    <rect x="270" y="162" width="170" height="12" fill="#FF9900"/>
    <text x="355" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="white">Lambda · API</text>
    <text x="355" y="190" text-anchor="middle" font-size="10" fill="#7E5109">Validate Cognito token</text>
    <text x="355" y="206" text-anchor="middle" font-size="10" fill="#7E5109">Async invoke orchestrator</text>
    <text x="355" y="222" text-anchor="middle" font-size="10" fill="#7E5109">Return 202 + runId</text>
  </g>

  <!-- Orchestrator -->
  <g filter="url(#shadow)">
    <rect x="510" y="130" width="170" height="100" rx="8" fill="white" stroke="#FF9900" stroke-width="1.5"/>
    <rect x="510" y="130" width="170" height="24" rx="8" fill="#FF9900"/>
    <rect x="510" y="142" width="170" height="12" fill="#FF9900"/>
    <text x="595" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="white">Lambda · Orchestrator</text>
    <text x="595" y="170" text-anchor="middle" font-size="10" fill="#7E5109">Acquire active run lock</text>
    <text x="595" y="185" text-anchor="middle" font-size="10" fill="#7E5109">Write run metadata</text>
    <text x="595" y="200" text-anchor="middle" font-size="10" fill="#7E5109">Apply company overrides</text>
    <text x="595" y="215" text-anchor="middle" font-size="10" fill="#7E5109">Invoke scanner per company</text>
  </g>

  <!-- Scanner fanout group -->
  <rect x="506" y="285" width="178" height="235" rx="8" fill="#FFF8EE" stroke="#FF9900" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="595" y="303" text-anchor="middle" font-size="11" font-weight="600" fill="#CC7A00">Scanner × N (parallel)</text>

  <!-- Scanner 1 -->
  <g filter="url(#shadow)">
    <rect x="516" y="312" width="158" height="60" rx="6" fill="white" stroke="#FF9900" stroke-width="1.5"/>
    <rect x="516" y="312" width="158" height="20" rx="6" fill="#FF9900"/>
    <rect x="516" y="320" width="158" height="12" fill="#FF9900"/>
    <text x="595" y="326" text-anchor="middle" font-size="10" font-weight="700" fill="white">Scanner · Company A</text>
    <text x="595" y="347" text-anchor="middle" font-size="10" fill="#7E5109">Fetch → filter → fragment</text>
    <text x="595" y="362" text-anchor="middle" font-size="10" fill="#7E5109">180s · 256 MB · ARM64</text>
  </g>

  <!-- Scanner 2 -->
  <g filter="url(#shadow)">
    <rect x="516" y="385" width="158" height="60" rx="6" fill="white" stroke="#FF9900" stroke-width="1.5"/>
    <rect x="516" y="385" width="158" height="20" rx="6" fill="#FF9900"/>
    <rect x="516" y="393" width="158" height="12" fill="#FF9900"/>
    <text x="595" y="399" text-anchor="middle" font-size="10" font-weight="700" fill="white">Scanner · Company B</text>
    <text x="595" y="420" text-anchor="middle" font-size="10" fill="#7E5109">Fetch → filter → fragment</text>
    <text x="595" y="435" text-anchor="middle" font-size="10" fill="#7E5109">Independent · no shared state</text>
  </g>

  <!-- Scanner N -->
  <text x="595" y="468" text-anchor="middle" font-size="18" fill="#FF9900" font-weight="700">···</text>
  <text x="595" y="485" text-anchor="middle" font-size="10" fill="#CC7A00">one Lambda per enabled company</text>
  <text x="595" y="500" text-anchor="middle" font-size="10" fill="#CC7A00">slow company never blocks others</text>

  <!-- Finalizer -->
  <g filter="url(#shadow)">
    <rect x="780" y="295" width="170" height="120" rx="8" fill="white" stroke="#FF9900" stroke-width="1.5"/>
    <rect x="780" y="295" width="170" height="24" rx="8" fill="#FF9900"/>
    <rect x="780" y="307" width="170" height="12" fill="#FF9900"/>
    <text x="865" y="313" text-anchor="middle" font-size="11" font-weight="700" fill="white">Lambda · Finalizer</text>
    <text x="865" y="335" text-anchor="middle" font-size="10" fill="#7E5109">Merge company fragments</text>
    <text x="865" y="350" text-anchor="middle" font-size="10" fill="#7E5109">Apply discard list</text>
    <text x="865" y="365" text-anchor="middle" font-size="10" fill="#7E5109">Save inventory snapshot</text>
    <text x="865" y="380" text-anchor="middle" font-size="10" fill="#7E5109">Send email notification</text>
    <text x="865" y="395" text-anchor="middle" font-size="10" fill="#7E5109">Release active run lock</text>
  </g>

  <!-- DynamoDB -->
  <g filter="url(#shadow)">
    <rect x="780" y="455" width="170" height="90" rx="8" fill="white" stroke="#4053D6" stroke-width="1.5"/>
    <rect x="780" y="455" width="170" height="24" rx="8" fill="#4053D6"/>
    <rect x="780" y="467" width="170" height="12" fill="#4053D6"/>
    <text x="865" y="473" text-anchor="middle" font-size="11" font-weight="700" fill="white">DynamoDB</text>
    <text x="865" y="495" text-anchor="middle" font-size="10" fill="#283593">Run lock · metadata</text>
    <text x="865" y="510" text-anchor="middle" font-size="10" fill="#283593">Company result fragments</text>
    <text x="865" y="525" text-anchor="middle" font-size="10" fill="#283593">Inventory snapshot · logs</text>
  </g>

  <!-- ATS -->
  <g filter="url(#shadow)">
    <rect x="510" y="540" width="170" height="60" rx="8" fill="#546E7A" stroke="#37474F" stroke-width="1.5"/>
    <rect x="510" y="540" width="170" height="24" rx="8" fill="#37474F"/>
    <rect x="510" y="552" width="170" height="12" fill="#37474F"/>
    <text x="595" y="558" text-anchor="middle" font-size="11" font-weight="700" fill="white">ATS Providers</text>
    <text x="595" y="578" text-anchor="middle" font-size="10" fill="#CFD8DC">Workday · Greenhouse · Ashby</text>
    <text x="595" y="593" text-anchor="middle" font-size="10" fill="#B0BEC5">Lever · SmartRecruiters</text>
  </g>

  <!-- Apps Script -->
  <g filter="url(#shadow)">
    <rect x="780" y="570" width="170" height="60" rx="8" fill="#1A73E8" stroke="#1557B0" stroke-width="1.5"/>
    <rect x="780" y="570" width="170" height="24" rx="8" fill="#1557B0"/>
    <rect x="780" y="582" width="170" height="12" fill="#1557B0"/>
    <text x="865" y="588" text-anchor="middle" font-size="11" font-weight="700" fill="white">Google Apps Script</text>
    <text x="865" y="608" text-anchor="middle" font-size="10" fill="#BBDEFB">Email: new + updated jobs</text>
  </g>

  <!-- ── ARROWS ── -->
  <!-- EventBridge → Orchestrator -->
  <path d="M 210 120 L 510 180" fill="none" stroke="#E7157B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="135" text-anchor="middle" font-size="9" fill="#E7157B">scheduled invoke</text>

  <!-- Browser → API -->
  <line x1="210" y1="230" x2="268" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="238" y="226" text-anchor="middle" font-size="9" fill="#555">POST /api/run</text>

  <!-- API → Orchestrator -->
  <line x1="440" y1="190" x2="508" y2="190" stroke="#FF9900" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="474" y="183" text-anchor="middle" font-size="9" fill="#FF9900">async invoke</text>

  <!-- Orchestrator → Scanner group -->
  <line x1="595" y1="230" x2="595" y2="283" stroke="#FF9900" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="615" y="260" font-size="9" fill="#FF9900">fanout</text>

  <!-- Scanner → ATS -->
  <line x1="595" y1="520" x2="595" y2="538" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="615" y="532" font-size="9" fill="#555">HTTPS</text>

  <!-- Scanner → DynamoDB (fragment write) -->
  <line x1="684" y1="370" x2="778" y2="480" stroke="#4053D6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="750" y="415" font-size="9" fill="#4053D6">write fragment</text>

  <!-- Scanner → Finalizer (last done triggers) -->
  <path d="M 684 355 L 780 355" fill="none" stroke="#FF9900" stroke-width="1.5" marker-end="url(#arrow-orange)" stroke-dasharray="5,3"/>
  <text x="730" y="345" text-anchor="middle" font-size="9" fill="#FF9900">last done invokes</text>

  <!-- Finalizer → DynamoDB -->
  <line x1="865" y1="415" x2="865" y2="453" stroke="#4053D6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="890" y="438" font-size="9" fill="#4053D6">save inventory</text>

  <!-- Finalizer → Apps Script -->
  <line x1="865" y1="415" x2="865" y2="568" stroke="#1A73E8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>

  <!-- Orchestrator → DynamoDB (lock) -->
  <path d="M 680 180 L 865 180 L 865 453" fill="none" stroke="#4053D6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <text x="780" y="173" text-anchor="middle" font-size="9" fill="#4053D6">acquire lock + metadata</text>

</svg>
